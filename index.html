<script type="module">
  // Importar las funciones que necesitamos de los SDKs de Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // TODO: Sustituye esto con TUS DATOS de la consola de Firebase
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "tu-proyecto.firebaseapp.com",
    projectId: "tu-proyecto",
    storageBucket: "tu-proyecto.appspot.com",
    messagingSenderId: "123456789",
    appId: "tu-app-id"
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // --- Lógica de Registro ---
  window.handleRegister = async (e) => {
    e.preventDefault();
    const email = document.querySelector('#register-screen input[type="email"]').value;
    const password = document.querySelector('#register-screen input[type="password"]').value;
    const nombre = document.querySelector('#register-screen input[type="text"]').value;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      console.log("Usuario registrado:", userCredential.user);
      // Aquí podrías guardar el nombre en el perfil del usuario si quisieras
      alert("¡Cuenta creada con éxito!");
    } catch (error) {
      alert("Error al registrar: " + error.message);
    }
  };

  // --- Lógica de Inicio de Sesión ---
  window.handleLogin = async (e) => {
    e.preventDefault();
    const email = document.querySelector('#login-screen input[type="email"]').value;
    const password = document.querySelector('#login-screen input[type="password"]').value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // El cambio de pantalla lo maneja el observador onAuthStateChanged
    } catch (error) {
      alert("Error al entrar: " + error.message);
    }
  };

  // --- Observador de Estado (Detecta si hay alguien logueado) ---
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // El usuario está dentro
      document.getElementById('user-display-name').innerText = user.email.split('@')[0]; // Usa el email como nombre temporal
      showScreen('dashboard-screen');
      renderDashboard();
    } else {
      // El usuario está fuera
      showScreen('home-screen');
    }
  });
</script>
